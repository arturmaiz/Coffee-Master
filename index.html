<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Master</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== START SCREEN ===== -->
  <div id="start-screen" class="screen active">
    <div class="steam-bg">
      <div class="steam s1"></div>
      <div class="steam s2"></div>
      <div class="steam s3"></div>
    </div>
    <div class="start-content">
      <div class="logo">
        <div class="logo-cup">☕</div>
        <h1>Coffee Master</h1>
        <p class="tagline">The art of the perfect pour</p>
      </div>
      <button id="play-btn" class="btn-primary">Start Shift</button>
      <div class="high-score-display">Best Score: <span id="start-best-score">0</span></div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="game-screen" class="screen">

    <!-- HUD -->
    <header class="hud">
      <div class="hud-left">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score-display">0</span>
        </div>
        <div class="hud-item combo-display" id="combo-display">
          <span class="hud-label">Combo</span>
          <span class="hud-value" id="combo-value">x1</span>
        </div>
      </div>
      <div class="hud-center">
        <div class="rush-indicator" id="rush-indicator">
          <span class="rush-label">Rush Level</span>
          <div class="rush-bar-wrap"><div class="rush-bar" id="rush-bar"></div></div>
        </div>
      </div>
      <div class="hud-right">
        <div class="lives" id="lives-display">
          <span class="hud-label">Reputation</span>
          <div class="hearts" id="hearts"></div>
        </div>
        <button id="pause-btn" class="btn-icon" title="Pause">⏸</button>
      </div>
    </header>

    <main class="game-layout">

      <!-- CUSTOMER QUEUE -->
      <section class="customer-queue" id="customer-queue">
        <h2 class="section-label">Orders</h2>
        <div class="queue-list" id="queue-list"></div>
      </section>

      <!-- COFFEE MACHINE -->
      <section class="machine-area">
        <div class="machine-panel">

          <!-- Cup preview -->
          <div class="cup-station">
            <div class="cup-label">Current Cup</div>
            <div class="cup-visual" id="cup-visual">
              <div class="cup-layers" id="cup-layers"></div>
              <div class="cup-base"></div>
            </div>
            <div class="cup-contents" id="cup-contents">
              <span class="empty-hint">Select size to begin</span>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-grid">

            <!-- Row 1: Size -->
            <div class="control-group">
              <div class="group-label">Size</div>
              <div class="btn-row">
                <button class="ingredient-btn size-btn" data-type="size" data-value="small">S</button>
                <button class="ingredient-btn size-btn" data-type="size" data-value="medium">M</button>
                <button class="ingredient-btn size-btn" data-type="size" data-value="large">L</button>
              </div>
            </div>

            <!-- Row 2: Coffee base -->
            <div class="control-group">
              <div class="group-label">Coffee</div>
              <div class="btn-row">
                <button class="ingredient-btn" data-type="base" data-value="espresso">Espresso</button>
                <button class="ingredient-btn" data-type="base" data-value="americano">Americano</button>
                <button class="ingredient-btn" data-type="base" data-value="latte">Latte</button>
                <button class="ingredient-btn" data-type="base" data-value="cappuccino">Cappuccino</button>
                <button class="ingredient-btn" data-type="base" data-value="mocha">Mocha</button>
              </div>
            </div>

            <!-- Row 3: Milk -->
            <div class="control-group">
              <div class="group-label">Milk</div>
              <div class="btn-row">
                <button class="ingredient-btn" data-type="milk" data-value="none">None</button>
                <button class="ingredient-btn" data-type="milk" data-value="whole">Whole</button>
                <button class="ingredient-btn" data-type="milk" data-value="oat">Oat</button>
                <button class="ingredient-btn" data-type="milk" data-value="skim">Skim</button>
              </div>
            </div>

            <!-- Row 4: Syrup -->
            <div class="control-group">
              <div class="group-label">Syrup</div>
              <div class="btn-row">
                <button class="ingredient-btn" data-type="syrup" data-value="none">None</button>
                <button class="ingredient-btn" data-type="syrup" data-value="vanilla">Vanilla</button>
                <button class="ingredient-btn" data-type="syrup" data-value="caramel">Caramel</button>
                <button class="ingredient-btn" data-type="syrup" data-value="hazelnut">Hazelnut</button>
              </div>
            </div>

            <!-- Row 5: Extras -->
            <div class="control-group">
              <div class="group-label">Extras</div>
              <div class="btn-row">
                <button class="ingredient-btn toggle-btn" data-type="sugar" data-value="sugar">Sugar</button>
                <button class="ingredient-btn toggle-btn" data-type="foam" data-value="foam">Foam</button>
                <button class="ingredient-btn toggle-btn" data-type="topping" data-value="cocoa">Cocoa</button>
                <button class="ingredient-btn toggle-btn" data-type="topping" data-value="cinnamon">Cinnamon</button>
              </div>
            </div>

          </div>

          <!-- Action buttons -->
          <div class="action-row">
            <button class="btn-secondary" id="clear-btn">Clear</button>
            <button class="btn-serve" id="serve-btn">Serve ☕</button>
          </div>

        </div>

        <!-- Feedback flash -->
        <div class="feedback" id="feedback"></div>
      </section>

    </main>
  </div>

  <!-- ===== PAUSE SCREEN ===== -->
  <div id="pause-screen" class="screen overlay">
    <div class="modal">
      <h2>Paused</h2>
      <button id="resume-btn" class="btn-primary">Resume</button>
      <button id="quit-btn" class="btn-secondary">Quit to Menu</button>
    </div>
  </div>

  <!-- ===== GAME OVER SCREEN ===== -->
  <div id="gameover-screen" class="screen overlay">
    <div class="modal">
      <div class="gameover-icon">☕</div>
      <h2>Shift Over</h2>
      <div class="final-stats">
        <div class="stat-row"><span>Final Score</span><strong id="final-score">0</strong></div>
        <div class="stat-row"><span>Best Score</span><strong id="final-best">0</strong></div>
      </div>
      <button id="restart-btn" class="btn-primary">New Shift</button>
      <button id="menu-btn" class="btn-secondary">Main Menu</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
